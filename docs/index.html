<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polymarket Smart Money</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f7fb; --card: #ffffff; --texto: #1a1d29; --sutil: #6b7280;
    --borde: #e5e7eb; --acento: #6366f1; --acento-suave: #eef0ff;
    --ok: #16a34a; --aviso: #d97706; --aviso-suave: #fef3c7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117; --card: #1a1d27; --texto: #e5e7ef; --sutil: #9ca3af;
      --borde: #2a2e3d; --acento: #818cf8; --acento-suave: #26294a;
      --ok: #4ade80; --aviso: #fbbf24; --aviso-suave: #3a2f14;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--texto);
         font-family: system-ui, -apple-system, sans-serif; }
  .contenedor { max-width: 880px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .3rem; }
  .sub { color: var(--sutil); font-size: .85rem; margin-bottom: 1.2rem; line-height: 1.5; }
  .sub b { color: var(--texto); font-weight: 600; }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
           gap: .6rem; margin-bottom: 1.2rem; }
  .tile { background: var(--card); border: 1px solid var(--borde);
          border-radius: .8rem; padding: .65rem .9rem; }
  .tile b { display: block; font-size: 1.45rem; line-height: 1.2; }
  .tile span { color: var(--sutil); font-size: .78rem; }

  .filtros { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center;
             margin-bottom: 1.2rem; }
  .filtros input[type=search], .filtros select {
    padding: .5rem .8rem; border: 1px solid var(--borde); border-radius: .6rem;
    background: var(--card); color: var(--texto); font-size: .9rem; }
  .filtros input[type=search] { flex: 1; min-width: 180px; }
  .filtros label.check { display: flex; align-items: center; gap: .4rem;
    font-size: .85rem; color: var(--sutil); cursor: pointer; user-select: none; }

  .tarjeta { background: var(--card); border: 1px solid var(--borde);
    border-radius: .9rem; padding: 1rem 1.2rem; margin-bottom: .8rem;
    display: grid; grid-template-columns: auto 1fr; gap: .3rem 1rem; }
  .tarjeta.stale { opacity: .62; }
  .n { grid-row: span 3; align-self: start; width: 3.2rem; height: 3.2rem;
    border-radius: .8rem; background: var(--acento-suave); color: var(--acento);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 800; font-size: 1.3rem; line-height: 1; }
  .n small { font-size: .55rem; font-weight: 600; margin-top: .2rem; opacity: .8; }
  .titulo { font-size: 1.02rem; font-weight: 600; }
  .titulo a { color: inherit; text-decoration: none; }
  .titulo a:hover { text-decoration: underline; }
  .pastilla { display: inline-block; margin-left: .4rem; padding: .1rem .55rem;
    border-radius: 999px; background: var(--acento-suave); color: var(--acento);
    font-size: .78rem; font-weight: 700; vertical-align: 1px; }
  .datos { color: var(--sutil); font-size: .85rem; display: flex;
    flex-wrap: wrap; gap: .2rem 1.2rem; }
  .datos b { color: var(--texto); font-weight: 600; }
  .deriva-ok { color: var(--ok); font-weight: 600; }
  .deriva-mal { color: var(--aviso); font-weight: 600; }
  .aviso-stale { grid-column: 2; font-size: .78rem; color: var(--aviso);
    background: var(--aviso-suave); border-radius: .5rem; padding: .3rem .6rem;
    justify-self: start; }
  details { grid-column: 2; }
  details summary { cursor: pointer; color: var(--sutil); font-size: .82rem; }
  details ul { margin: .4rem 0 0; padding-left: 1.2rem; }
  details li { font-size: .82rem; color: var(--sutil); margin-bottom: .15rem; }
  details li b { color: var(--texto); }
  details li a { color: inherit; text-decoration: none; }
  details li a:hover { text-decoration: underline; }
  #vacio { color: var(--sutil); text-align: center; padding: 2.5rem 0; }
  h2 { font-size: 1.05rem; margin: 2rem 0 .6rem;
    border-top: 1px solid var(--borde); padding-top: 1.2rem; }
  .whale { background: var(--card); border: 1px solid var(--borde);
    border-radius: .7rem; padding: .55rem .9rem; margin-bottom: .45rem;
    font-size: .88rem; color: var(--sutil); }
  .whale a { color: var(--texto); text-decoration: none; }
  .whale a:hover { text-decoration: underline; }
  .whale-usd { color: var(--acento); font-weight: 800; margin-right: .4rem; }
  .top-badge { background: var(--ok); color: var(--card); border-radius: 999px;
    padding: .05rem .5rem; font-size: .72rem; font-weight: 700; }
  .longshot-badge { background: #b45309; color: #fff; border-radius: 999px;
    padding: .05rem .5rem; font-size: .72rem; font-weight: 700; }
  #historial { margin-top: 2rem; border-top: 1px solid var(--borde); padding-top: 1rem; }
  .acierto { color: var(--ok); font-weight: 700; }
  .fallo { color: var(--aviso); font-weight: 700; }
  footer { margin-top: 3rem; color: var(--sutil); font-size: .78rem; text-align: center; }
  footer a { color: inherit; }
</style>
</head>
<body>
<div class="contenedor">
  <h1>📡 Polymarket Smart Money</h1>
  <div class="sub" id="meta">Cargando…</div>
  <div class="tiles" id="tiles" hidden>
    <div class="tile"><b id="t-frescas">–</b><span>señales frescas</span></div>
    <div class="tile"><b id="t-stale">–</b><span>descartadas</span></div>
    <div class="tile"><b id="t-whales">–</b><span>whales últimas 24 h</span></div>
    <div class="tile"><b id="t-aciertos">–</b><span>tasa de acierto</span></div>
  </div>
  <div class="filtros" id="filtros" hidden>
    <input type="search" id="busqueda" placeholder="Buscar mercado…">
    <select id="minTraders">
      <option value="0">Todas las señales</option>
      <option value="7">7+ traders</option>
      <option value="10">10+ traders</option>
      <option value="15">15+ traders</option>
    </select>
    <label class="check"><input type="checkbox" id="verStale"> mostrar descartadas</label>
  </div>
  <div id="lista"></div>
  <p id="vacio" hidden></p>
  <h2 id="whales-titulo" hidden>🐋 Compras grandes recientes</h2>
  <div id="whales"></div>
  <details id="historial" hidden>
    <summary></summary>
    <ul id="historial-lista"></ul>
  </details>
  <footer>Escáner de coincidencias de top traders y compras whale ·
    <a href="https://github.com/edulabrador/polymarket-smart-money"
       target="_blank" rel="noopener">código en GitHub</a> · no es consejo financiero</footer>
</div>
<script>
const usd = n => '$' + n.toLocaleString('es-ES', {maximumFractionDigits: 0});
const pct = p => Math.round(p * 100) + '%';
const esc = s => String(s).replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// nombres autogenerados tipo "0xabc...-17599357" -> version corta legible
const nombre = (n, wallet) =>
  !n || /^0x[0-9a-fA-F]{6,}/.test(n) ? wallet.slice(0, 8) + '…' : n;
const el = id => document.getElementById(id);
let datos = null;

function renderMeta() {
  const d = datos;
  const mins = Math.max(0, Math.round((Date.now() - new Date(d.updatedAt)) / 60000));
  el('meta').innerHTML =
    `Escaneo automático cada <b>${d.params.scanEveryMin ?? 10} min</b> · ` +
    `última actualización <b>hace ${mins} min</b> · ` +
    `vigila el top <b>${d.params.topN}</b> por PnL (30 días) y compras ≥ <b>${usd(d.params.whaleMinUsd ?? 50000)}</b> · ` +
    `señal a partir de <b>${d.params.minUsers} traders</b> con posición ≥ <b>${usd(d.params.minPositionUsd)}</b>`;
}

function renderTiles() {
  const d = datos, hist = d.history ?? [], whales = d.whales ?? [];
  const frescas = d.signals.filter(s => !s.stale).length;
  const dia = Date.now() / 1000 - 86400;
  el('t-frescas').textContent = frescas;
  el('t-stale').textContent = d.signals.length - frescas;
  el('t-whales').textContent = whales.filter(w => w.timestamp > dia).length;
  const aciertos = hist.filter(h => h.won).length;
  el('t-aciertos').textContent = hist.length
    ? `${aciertos}/${hist.length} (${Math.round(100 * aciertos / hist.length)}%)` : '—';
  el('tiles').hidden = false;
}

function renderSignals() {
  const d = datos;
  const q = el('busqueda').value.toLowerCase();
  const minT = +el('minTraders').value;
  const verStale = el('verStale').checked;
  const visibles = d.signals.filter(s =>
    (!s.stale || verStale) && s.numTraders >= minT &&
    (!q || s.title.toLowerCase().includes(q)));

  el('lista').innerHTML = '';
  for (const s of visibles) {
    const deriva = s.curPrice - s.avgEntryPrice;
    const claseDeriva = s.stale ? 'deriva-mal' : 'deriva-ok';
    const traders = s.traders.map(t =>
      `<li><a href="https://polymarket.com/profile/${encodeURIComponent(t.wallet)}"
         target="_blank" rel="noopener"><b>${esc(nombre(t.name, t.wallet))}</b></a>
         — ${usd(t.usd)} (entrada ${pct(t.avgPrice)})</li>`).join('');
    const div = document.createElement('div');
    div.className = 'tarjeta' + (s.stale ? ' stale' : '');
    div.innerHTML = `
      <div class="n">${s.numTraders}<small>traders</small></div>
      <div class="titulo">
        <a href="https://polymarket.com/event/${encodeURIComponent(s.eventSlug)}"
           target="_blank" rel="noopener">${esc(s.title)}</a>
        <span class="pastilla">${esc(s.outcome)}</span>
      </div>
      <div class="datos">
        <span>entrada <b>${pct(s.avgEntryPrice)}</b> → ahora <b>${pct(s.curPrice)}</b>
          <span class="${claseDeriva}">(${deriva >= 0 ? '+' : '−'}${Math.abs(Math.round(deriva * 100))} pp)</span></span>
        <span>capital <b>${usd(s.totalUsd)}</b></span>
        <span>detectada <b>${new Date(s.firstSeen).toLocaleDateString('es-ES')}</b></span>
      </div>
      ${s.stale ? `<div class="aviso-stale">⚠️ descartada: el precio difiere ${Math.abs(Math.round(deriva * 100))} pp de la entrada media (límite ±${Math.round((datos.params.maxPriceDrift ?? 0.15) * 100)}) — la tesis de entrada ya no es la actual</div>` : ''}
      <details><summary>ver los ${s.numTraders} traders</summary><ul>${traders}</ul></details>`;
    el('lista').appendChild(div);
  }
  const vacio = el('vacio');
  vacio.hidden = visibles.length > 0;
  if (!visibles.length) {
    const ocultas = d.signals.filter(s => s.stale).length;
    vacio.textContent = ocultas && !verStale
      ? `Sin señales frescas ahora mismo (${ocultas} descartada${ocultas > 1 ? 's' : ''} por precio ya movido — activa "mostrar descartadas").`
      : 'Ninguna señal coincide con los filtros.';
  }
}

function renderWhales() {
  const whales = datos.whales ?? [];
  const q = el('busqueda').value.toLowerCase();
  const visibles = whales.filter(w => !q || w.title.toLowerCase().includes(q));
  el('whales-titulo').hidden = !visibles.length;
  el('whales').innerHTML = visibles.map(w => {
    const horas = Math.floor((Date.now() / 1000 - w.timestamp) / 3600);
    const hace = horas < 1 ? 'hace &lt;1 h' : `hace ${horas} h`;
    const quien = esc(nombre(w.name, w.wallet));
    return `<div class="whale">
      <span class="whale-usd">${usd(w.usd)}</span>
      <a href="https://polymarket.com/event/${encodeURIComponent(w.eventSlug)}"
         target="_blank" rel="noopener">${esc(w.title)}</a>
      <span class="pastilla">${esc(w.outcome)}</span> @ ${pct(w.price)} ·
      <a href="https://polymarket.com/profile/${encodeURIComponent(w.wallet)}"
         target="_blank" rel="noopener">${quien}</a>${w.isTop ? ' <span class="top-badge">TOP 50</span>' : ''}${w.longshot ? ' <span class="longshot-badge" title="Compra grande a cuota improbable: posible información privilegiada">🕵 LONGSHOT</span>' : ''}
      · ${hace}</div>`;
  }).join('');
}

function renderHistory() {
  const hist = datos.history ?? [];
  if (!hist.length) return;
  const aciertos = hist.filter(h => h.won).length;
  const histEl = el('historial');
  histEl.hidden = false;
  histEl.querySelector('summary').textContent =
    `Histórico de señales resueltas (${aciertos}/${hist.length} aciertos)`;
  el('historial-lista').innerHTML = hist
    .slice().reverse().map(h =>
      `<li><span class="${h.won ? 'acierto' : 'fallo'}">${h.won ? '✓ acierto' : '✗ fallo'}</span>
       — ${esc(h.title)} [${esc(h.outcome)}] · ${h.numTraders} traders · entrada ${pct(h.avgEntryPrice)}
       · resuelta ${new Date(h.resolvedAt).toLocaleDateString('es-ES')}${h.stale ? ' · (estaba descartada)' : ''}</li>`)
    .join('');
}

async function cargar() {
  try {
    const r = await fetch('signals.json', {cache: 'no-store'});
    const d = await r.json();
    const cambio = !datos || d.updatedAt !== datos.updatedAt;
    datos = d;
    d.signals.forEach(s => s.stale = s.stale ?? false);
    renderMeta();          // el "hace X min" se refresca siempre
    if (!cambio) return;   // no re-pintar listas sin datos nuevos (respeta <details> abiertos)
    renderTiles();
    renderSignals();
    renderWhales();
    renderHistory();
    el('filtros').hidden = false;
  } catch (e) {
    el('meta').textContent = 'Error cargando signals.json: ' + e.message;
  }
}

['busqueda', 'minTraders', 'verStale'].forEach(id =>
  el(id).addEventListener('input', () => { renderSignals(); renderWhales(); }));
cargar();
setInterval(cargar, 60000);
</script>
</body>
</html>
