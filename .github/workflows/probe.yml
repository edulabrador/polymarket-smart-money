name: probe
on: workflow_dispatch
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python probe.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/fixtures NOTES.md
          git commit -m "Fase 0: fixtures y endpoints verificados" || echo "sin cambios"
          git push
